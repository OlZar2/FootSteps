name: ci

on:
  push:
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Selectel into workspace
        env:
          SEL_ACCOUNT_ID: ${{ secrets.SEL_ACCOUNT_ID }}
          SEL_PROJECT_NAME: ${{ secrets.SEL_PROJECT_NAME }}
          SEL_USER_NAME: ${{ secrets.SEL_USER_NAME }}
          SEL_USER_PASSWORD: ${{ secrets.SEL_USER_PASSWORD }}
          SECRETS_DIR: ${{ github.workspace }}/.secrets
        run: |
          chmod +x ./scripts/fetch-selectel-secrets.sh
          ./scripts/fetch-selectel-secrets.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Compose up
        env:
          SECRETS_DIR: ${{ github.workspace }}/.secrets
        run: |
          docker compose -f ci-compose.yaml build --pull
          docker compose -f ci-compose.yaml up -d

      - name: Smoke check
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5000/swagger/index.html >/dev/null 2>&1; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done

          echo "Swagger did not become available"
          docker compose -f ci-compose.yaml ps
          docker compose -f ci-compose.yaml logs --no-color --tail=200 fs-api
          exit 1

      - name: Teardown
        if: always()
        run: |
          docker compose -f ci-compose.yaml down -v