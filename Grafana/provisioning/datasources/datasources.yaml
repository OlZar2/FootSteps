apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    isDefault: true
    url: http://loki:3100
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
    secureJsonData:
      httpHeaderName1: "X-Scope-OrgID"
      httpHeaderValue1: "anonymous"
